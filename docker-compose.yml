version: "3.9"

services:
  claude-code:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: claude-code:dev
    container_name: claude-code-dev

    env_file:
      - .env

    volumes:
      - ./workspace:/workspace
      - ./data/claude:/root/.claude

    tty: true
    stdin_open: true

    restart: unless-stopped
